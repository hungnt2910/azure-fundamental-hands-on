services:
  backend:
    container_name: azure-gallery-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - azure-net

  frontend:
    container_name: azure-gallery-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - azure-net

networks:
  azure-net:
    driver: bridge

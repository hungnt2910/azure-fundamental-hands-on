<div class="register-container">
  <div class="register-box">
    <div class="register-header text-center mb-8">
      <h1 class="text-4xl font-extrabold mb-2">
        <span class="title-gradient">Azure</span> Cloud Gallery
      </h1>
      <p class="text-secondary">Tạo tài khoản mới</p>
    </div>

    <form (ngSubmit)="register()" class="space-y-6">
      <div class="form-group">
        <label for="username" class="block text-sm font-medium mb-2">Tên đăng nhập</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          class="w-full px-4 py-3 bg-glass border border-glass rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-secondary"
          placeholder="Chọn tên đăng nhập"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="password" class="block text-sm font-medium mb-2">Mật khẩu</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          class="w-full px-4 py-3 bg-glass border border-glass rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-secondary"
          placeholder="Nhập mật khẩu (ít nhất 6 ký tự)"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword" class="block text-sm font-medium mb-2">Xác nhận mật khẩu</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          class="w-full px-4 py-3 bg-glass border border-glass rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-secondary"
          placeholder="Xác nhận mật khẩu"
          [disabled]="loading"
        />
      </div>

      <div *ngIf="error" class="error-message text-red-500 text-sm p-3 bg-red-500 bg-opacity-20 rounded-lg">
        {{ error }}
      </div>

      <div *ngIf="success" class="success-message text-green-500 text-sm p-3 bg-green-500 bg-opacity-20 rounded-lg">
        {{ success }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full px-4 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold rounded-lg hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Đang đăng ký...' : 'Đăng ký' }}
      </button>
    </form>

    <div class="text-center mt-6 text-sm text-secondary">
      <p>
        Đã có tài khoản?
        <a routerLink="/login" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">
          Đăng nhập
        </a>
      </p>
    </div>
  </div>
</div>

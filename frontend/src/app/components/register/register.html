<div class="register-container">
  <!-- Background Animation -->
  <div class="background-animation">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Main Wrapper -->
  <div class="register-wrapper">
    <!-- Illustration Section (Left on Desktop) -->
    <div class="illustration">
      <div class="illustration-content">
        <div class="icon-large">📝</div>
        <h2 class="illustration-text">Create Your Account</h2>
        <p style="font-size: 13px; color: rgba(255, 255, 255, 0.6); margin-top: 8px;">
          Join our cloud gallery and start sharing
        </p>
      </div>
    </div>

    <!-- Register Box (Right on Desktop) -->
    <div class="register-box">
      <!-- Header -->
      <div class="register-header">
        <div class="logo-section">
          <span class="logo-icon">☁️</span>
          <h1 class="logo-text">Azure <span class="gradient-text">Gallery</span></h1>
        </div>
        <p class="tagline">Create a new account to get started</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="register()" class="register-form">
        <!-- Username Field -->
        <div class="form-group">
          <label for="username" class="form-label">
            <span class="label-icon">👤</span>
            Username
          </label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="username"
              [(ngModel)]="username"
              name="username"
              class="form-input"
              placeholder="Choose your username"
              [disabled]="loading"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password" class="form-label">
            <span class="label-icon">🔐</span>
            Password
          </label>
          <div class="input-wrapper">
            <span class="input-icon">🔐</span>
            <input
              type="password"
              id="password"
              [(ngModel)]="password"
              name="password"
              class="form-input"
              placeholder="Minimum 6 characters"
              [disabled]="loading"
            />
          </div>
        </div>

        <!-- Confirm Password Field -->
        <div class="form-group">
          <label for="confirmPassword" class="form-label">
            <span class="label-icon">✓</span>
            Confirm Password
          </label>
          <div class="input-wrapper">
            <span class="input-icon">✓</span>
            <input
              type="password"
              id="confirmPassword"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              class="form-input"
              placeholder="Re-enter your password"
              [disabled]="loading"
            />
          </div>
        </div>

        <!-- Error Alert -->
        <div *ngIf="error" class="alert alert-error">
          <span class="alert-icon">⚠️</span>
          <span class="alert-text">{{ error }}</span>
        </div>

        <!-- Success Alert -->
        <div *ngIf="success" class="alert alert-success">
          <span class="alert-icon">✓</span>
          <span class="alert-text">{{ success }}</span>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loading"
          class="submit-button"
        >
          <span class="spinner" [class.hidden]="!loading"></span>
          <span class="button-text" [class.hidden]="loading">Create Account</span>
          <span [class.hidden]="!loading">Registering...</span>
        </button>

        <!-- Divider -->
        <div class="divider">
          <span class="divider-text">Already have an account?</span>
        </div>
      </form>

      <!-- Footer -->
      <div class="footer-section">
        <p class="footer-text">
          <a routerLink="/login" class="link">Sign in instead</a>
        </p>
      </div>
    </div>
  </div>
</div>

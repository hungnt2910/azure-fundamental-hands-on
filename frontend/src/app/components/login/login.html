<div class="login-container">
  <!-- Animated Background Elements -->
  <div class="background-animation">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-box">
      <!-- Header Section -->
      <div class="login-header">
        <div class="logo-section">
          <div class="logo-icon">☁️</div>
          <h1 class="logo-text"><span class="gradient-text">Azure</span> Gallery</h1>
        </div>
        <p class="tagline">Đăng nhập vào hệ thống</p>
      </div>

      <!-- Form Section -->
      <form (ngSubmit)="login()" class="login-form">
        <!-- Username Field -->
        <div class="form-group">
          <label for="username" class="form-label">
            <span class="label-icon">👤</span>
            Tên đăng nhập
          </label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              [(ngModel)]="username"
              name="username"
              class="form-input"
              placeholder="Nhập tên đăng nhập của bạn"
              [disabled]="loading"
              autocomplete="username"
            />
            <span class="input-icon">📧</span>
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password" class="form-label">
            <span class="label-icon">🔐</span>
            Mật khẩu
          </label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              [(ngModel)]="password"
              name="password"
              class="form-input"
              placeholder="Nhập mật khẩu của bạn"
              [disabled]="loading"
              autocomplete="current-password"
            />
            <span class="input-icon">🔑</span>
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="error" class="alert alert-error">
          <span class="alert-icon">⚠️</span>
          <span class="alert-text">{{ error }}</span>
        </div>

        <!-- Submit Button -->
        <button type="submit" [disabled]="loading" class="submit-button">
          <span class="button-text">{{ loading ? 'Đang xử lý...' : 'Đăng nhập' }}</span>
          <span class="button-icon" [class.hidden]="loading">→</span>
          <span class="spinner" [class.hidden]="!loading"></span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-text">Hoặc</span>
      </div>

      <!-- Register Link -->
      <div class="footer-section">
        <p class="footer-text">
          Chưa có tài khoản?
          <a routerLink="/register" class="link">Đăng ký ngay</a>
        </p>
      </div>
    </div>

    <!-- Illustration -->
    <div class="illustration">
      <div class="illustration-content">
        <div class="icon-large">🏢</div>
        <p class="illustration-text">Quản lý ảnh trên đám mây</p>
      </div>
    </div>
  </div>
</div>

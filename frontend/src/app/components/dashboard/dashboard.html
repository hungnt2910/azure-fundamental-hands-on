<main class="container">
  <header class="header-with-user">
    <div class="header-content">
      <div class="text-center">
        <h1 class="text-5xl font-extrabold mb-2">
          <span class="title-gradient">Azure</span> Cloud Gallery
        </h1>
        <p class="text-secondary text-lg">Hệ thống lưu trữ và phân tích ảnh thông minh sử dụng Azure Services.</p>
      </div>
      <div class="user-info">
        <span class="text-secondary">Xin chào, <strong>{{ currentUser$ | async }}</strong></span>
        <button 
          (click)="logout()" 
          class="logout-btn"
        >
          Đăng xuất
        </button>
      </div>
    </div>
  </header>

  <div class="main-layout">
    <aside class="upload-sidebar">
      <app-upload></app-upload>
    </aside>

    <div class="divider-v"></div>

    <section class="gallery-main">
      <app-gallery></app-gallery>
    </section>
  </div>

  <footer class="mt-24 py-8 text-center text-secondary text-sm border-t border-glass">
    <p>© 2026 Azure Learning Path. Build with .NET 10 & Angular.</p>
  </footer>
</main>
